<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعلمون | نظام إدارة المدرسة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <a class="logo" href="index.html">نظام المدرسة</a>
        <nav class="navbar" aria-label="التنقل الرئيسي">
            <a href="index.html">الرئيسية</a>
            <a href="students.html">الطلاب</a>
            <a class="active" href="teachers.html">المعلمون</a>
            <a href="grades.html">العلامات</a>
        </nav>
    </header>

    <main class="page-shell two-column">
        <section class="form-panel">
            <h1>بيانات معلم</h1>
            <form>
                <label for="teacher-name">اسم المعلم الرباعي</label>
                <input id="teacher-name" type="text" placeholder="مثال: محمد علي حسن">

                <label for="teacher-subject">المادة</label>
                <select id="teacher-subject">
                    <option>الرياضيات</option>
                    <option>العلوم</option>
                    <option>اللغة العربية</option>
                    <option>المعلوماتية</option>
                </select>

                <label for="teacher-date">تاريخ التعيين</label>
                <input id="teacher-date" type="date">

                <button class="submit-btn" type="button">عرض تجريبي فقط</button>
            </form>
        </section>

        <section class="table-panel">
            <h2>فريق التعليم</h2>
            <table>
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>المادة</th>
                        <th>تاريخ التعيين</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>

    <footer class="main-footer">
        <p>جميع الحقوق محفوظة &copy; 2026 - نظام إدارة المدرسة</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
